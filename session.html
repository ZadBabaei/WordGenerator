            <a href="./Words.html">Words</a>
            <a href="./clock.html">Timer</a>
            <a href="./rules.html">Rules</a>
        </div>
    </nav>
</header>

<div class="session-container">
    <!-- Create Session Section -->
    <div class="session-card" id="createSection">
        <h2>Create New Session</h2>
        <div class="input-group">
            <label for="name">Your Name:</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="input-group">
            <label for="sessionLang">Language:</label>
            <select id="sessionLang">
                <option value="en">English</option>
                <option value="fa">فارسی (Farsi)</option>
            </select>
        </div>
        <button class="btn btn-primary" id="createBtn">Create Session</button>
    </div>

    <!-- Join Session Section -->
    <div class="session-card" id="joinSection">
        <h2>Join Session</h2>
        <div class="input-group">
            <label for="joinName">Your Name:</label>
            <input type="text" id="joinName" placeholder="Enter your name">
        </div>
        <div class="input-group">
            <label for="joinCode">Room Code:</label>
            <input type="text" id="joinCode" placeholder="e.g. A3F7K2" maxlength="6" style="text-transform: uppercase;">
        </div>
        <button class="btn btn-primary" id="joinBtn">Join Session</button>
    </div>

    <!-- Room Code Display (hidden by default) -->
    <div class="room-code-display hidden" id="roomCodeDisplay">
        <h2>Room Code</h2>
        <div class="room-code" id="roomCode">------</div>
        <p class="room-hint">Share this code with your friends!</p>

        <div class="player-list-section">
            <h3>Players (<span id="playerCount">0</span>)</h3>
            <ul class="player-list" id="playerList"></ul>
        </div>

        <button class="btn btn-primary" id="goToWordsBtn">Go to Words →</button>
    </div>
</div>
