<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Word Generator - Words</title>
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">WG</div>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./session.html">Session</a>
            <a href="./Words.html" class="active">Words</a>
            <a href="./clock.html">Timer</a>
            <a href="./rules.html">Rules</a>
        </div>
    </nav>
</header>

<div class="wordsPageContainer">
    <div class="topPageInput">
        <div class="input-group">
            <label for="playerName">Player's Name:</label>
            <input type="text" id="playerName" placeholder="Your name">
        </div>
        <div class="input-group">
            <label for="sessionCode">Session Code:</label>
            <input type="text" id="sessionCode" placeholder="e.g. A3F7K2" maxlength="6" style="text-transform: uppercase;">
        </div>
        <div class="lang-buttons">
            <button class="lang-btn" id="eng">English</button>
            <button class="lang-btn" id="farsi">فارسی</button>
        </div>
    </div>

    <div class="difficulty-selector">
        <h3>Choose your words:</h3>
        <div class="difficulty-inputs">
            <div class="diff-input">
                <label for="easyCount">Easy</label>
                <input type="number" id="easyCount" min="0" max="10" value="2">
            </div>
            <div class="diff-input">
                <label for="moderateCount">Moderate</label>
                <input type="number" id="moderateCount" min="0" max="10" value="1">
            </div>
            <div class="diff-input">
                <label for="hardCount">Hard</label>
                <input type="number" id="hardCount" min="0" max="10" value="1">
            </div>
        </div>
    </div>

    <div class="word-list" id="rightCard">
        <p>Click "Generate" to get your words!</p>
    </div>

    <div class="buttons">
        <button class="btn" id="generate">Generate</button>
        <button class="btn" id="reload">Reload</button>
        <button class="btn btn-select" id="select">Lock In Words</button>
    </div>
</div>
